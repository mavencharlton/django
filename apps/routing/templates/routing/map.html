<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>⛽ Fuel Route Planner</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; }
    .topbar { background: #1a1a2e; color: white; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 1rem; font-weight: 600; }
    .btn-new { background: #f39c12; color: white; border: none; padding: 8px 18px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
    .btn-new:hover { background: #e67e22; }
    #map { height: 60vh; width: 100%; }
    #panel { max-width: 980px; margin: 24px auto; padding: 0 20px 40px; }
    .route-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .route-title { font-size: 1.1rem; font-weight: 600; color: #1a1a2e; }
    .route-meta { font-size: 0.85rem; color: #666; margin-top: 2px; }
    .total-cost { font-size: 1.6rem; font-weight: 700; color: #27ae60; }
    .legend { display: flex; gap: 20px; margin-bottom: 14px; font-size: 0.82rem; color: #555; }
    .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    th { background: #1a1a2e; color: white; padding: 11px 16px; text-align: left; font-size: 0.82rem; }
    td { padding: 11px 16px; border-bottom: 1px solid #f0f0f0; font-size: 0.83rem; color: #333; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .empty-state { text-align: center; padding: 60px 20px; color: #999; font-size: 1rem; }
    .loading { text-align: center; padding: 60px 20px; color: #999; display: none; }

    /* Toast */
    .toast { position: fixed; bottom: 28px; right: 28px; background: #1a1a2e; color: white; padding: 12px 20px; border-radius: 10px; font-size: 0.82rem; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; z-index: 9999; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* Modal */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .modal { background: white; border-radius: 14px; padding: 32px; width: 420px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .modal h2 { font-size: 1.1rem; margin-bottom: 6px; color: #1a1a2e; }
    .modal p { font-size: 0.83rem; color: #888; margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.8rem; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
    .field input { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.92rem; outline: none; transition: border 0.2s; }
    .field input:focus { border-color: #f39c12; }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
    .btn-cancel { flex: 1; padding: 10px; border: 1.5px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-size: 0.88rem; color: #555; }
    .btn-submit { flex: 2; padding: 10px; background: #1a1a2e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-weight: 600; }
    .btn-submit:disabled { background: #aaa; cursor: not-allowed; }
    .error-msg { color: #e74c3c; font-size: 0.82rem; margin-top: 12px; display: none; }

    /* Custom map pins */
    .pin { width: 32px; height: 32px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
    .pin-start { background: #2ecc71; }
    .pin-end   { background: #e74c3c; }
    .pin-fuel  { background: #f39c12; display: flex; align-items: center; justify-content: center; border-radius: 50%; transform: none; font-size: 15px; }
  </style>
</head>
<body>

<div class="topbar">
  <h1>⛽ Fuel Route Planner</h1>
  <button class="btn-new" onclick="openModal()">+ New Route</button>
</div>

<div id="map"></div>

<div id="panel">
  <div class="empty-state" id="empty">🚗 Plan your first route using the button above</div>
  <div class="loading" id="loading">⏳ Calculating route…</div>
  <div id="results" style="display:none">
    <div class="route-header">
      <div>
        <div class="route-title" id="route-title"></div>
        <div class="route-meta" id="route-meta"></div>
      </div>
      <div class="total-cost" id="route-cost"></div>
    </div>
    <div class="legend">
      <span><span class="dot" style="background:#2ecc71"></span>Start</span>
      <span><span class="dot" style="background:#e74c3c"></span>End</span>
      <span><span class="dot" style="background:#f39c12"></span>Fuel stop</span>
      <span><span class="dot" style="background:#2980b9"></span>Route</span>
    </div>
    <table>
      <thead><tr><th>Location</th><th>Gallons</th><th>Price</th><th>Cost</th></tr></thead>
      <tbody id="breakdown-body"></tbody>
    </table>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeOnBackdrop(event)">
  <div class="modal">
    <h2>Plan a New Route</h2>
    <p>Enter start and end locations within the USA</p>
    <div class="field">
      <label>Start</label>
      <input id="inp-start" type="text" placeholder="Chicago, IL" value="Chicago, IL"/>
    </div>
    <div class="field">
      <label>End</label>
      <input id="inp-end" type="text" placeholder="Los Angeles, CA" value="Los Angeles, CA"/>
    </div>
    <div class="error-msg" id="err-msg"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" id="btn-submit" onclick="submitRoute()">Calculate Route</button>
    </div>
  </div>
</div>

<script>
  // ── Map ──────────────────────────────────────────────────
  var map = L.map('map').setView([39.5, -98.35], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);
  var routeLayers = [];

  function clearMap() {
    routeLayers.forEach(l => map.removeLayer(l));
    routeLayers = [];
  }

  function makePin(color, emoji) {
    return L.divIcon({
      className: '',
      html: emoji
        ? `<div class="pin pin-fuel">${emoji}</div>`
        : `<div class="pin" style="background:${color}"></div>`,
      iconSize:   [32, 32],
      iconAnchor: [16, 32],
      popupAnchor:[0, -32],
    });
  }

  // ── Modal ─────────────────────────────────────────────────
  function openModal() {
    document.getElementById('overlay').classList.add('open');
    document.getElementById('inp-start').focus();
  }
  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('err-msg').style.display = 'none';
  }
  function closeOnBackdrop(e) {
    if (e.target.id === 'overlay') closeModal();
  }

  // ── Toast ─────────────────────────────────────────────────
  function showToast(msg, duration = 4000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  // ── Submit ────────────────────────────────────────────────
  async function submitRoute() {
    const start = document.getElementById('inp-start').value.trim();
    const end   = document.getElementById('inp-end').value.trim();
    const btn   = document.getElementById('btn-submit');
    const err   = document.getElementById('err-msg');

    if (!start || !end) { showErr('Please enter both locations.'); return; }

    btn.disabled    = true;
    btn.textContent = 'Calculating…';
    err.style.display = 'none';
    closeModal();

    document.getElementById('empty').style.display   = 'none';
    document.getElementById('results').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    const t0 = performance.now();

    try {
      const res  = await fetch('/route/', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
        body:    JSON.stringify({ start, end })
      });
      const data = await res.json();
      if (!res.ok) { showErr(data.error || JSON.stringify(data)); return; }

      const clientMs = ((performance.now() - t0) / 1000).toFixed(2);
      renderResult(data, clientMs);
    } catch(e) {
      showErr('Could not reach the server.');
      document.getElementById('loading').style.display = 'none';
      document.getElementById('empty').style.display   = 'block';
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Calculate Route';
    }
  }

  // ── Render ────────────────────────────────────────────────
  function renderResult(data, clientMs) {
    document.getElementById('loading').style.display  = 'none';
    document.getElementById('results').style.display  = 'block';

    document.getElementById('route-title').textContent = `🗺 ${data.start} → ${data.end}`;
    document.getElementById('route-meta').textContent  = `${data.total_miles} miles · ${data.fuel_stops.length} fuel stops · ${data.meta.elapsed_seconds}s server · ${clientMs}s total`;
    document.getElementById('route-cost').textContent  = `💰 $${data.total_cost}`;

    // Breakdown table
    document.getElementById('breakdown-body').innerHTML = data.cost_breakdown.map(b =>
      `<tr><td>${b.at}</td><td>${b.gallons} gal</td><td>$${b.price_per_gallon}/gal</td><td><b>$${b.cost}</b></td></tr>`
    ).join('');

    // Map
    clearMap();
    const coords = data.geometry.coordinates.map(c => [c[1], c[0]]);
    const line   = L.polyline(coords, { color: '#2980b9', weight: 4, opacity: 0.8 }).addTo(map);
    routeLayers.push(line);
    map.fitBounds(line.getBounds(), { padding: [50, 50] });

    // Start pin
    routeLayers.push(
      L.marker(coords[0], { icon: makePin('#2ecc71') })
       .addTo(map).bindPopup(`<b>🚀 Start</b><br>${data.start}`)
    );

    // End pin
    routeLayers.push(
      L.marker(coords[coords.length - 1], { icon: makePin('#e74c3c') })
       .addTo(map).bindPopup(`<b>🏁 End</b><br>${data.end}`)
    );

    // Fuel stop pins
    data.fuel_stops.forEach((stop, i) => {
      const idx = Math.floor((stop.miles_into_route / data.total_miles) * (coords.length - 1));
      routeLayers.push(
        L.marker(coords[idx], { icon: makePin(null, '⛽') })
         .addTo(map)
         .bindPopup(`<b>⛽ Stop ${i+1}</b><br>${stop.station_name}<br>${stop.city}, ${stop.state}<br><b>$${stop.price_per_gallon}/gal</b><br>Mile ${stop.miles_into_route}`)
      );
    });

    // Toast
    showToast(`✅ Route calculated in ${data.meta.elapsed_seconds}s · ${data.meta.api_calls} API calls`);
  }

  function showErr(msg) {
    const e = document.getElementById('err-msg');
    e.textContent   = msg;
    e.style.display = 'block';
    openModal();
  }

  function getCookie(name) {
    const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
    return v ? v[2] : '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('open')) submitRoute();
  });
</script>
</body>
</html>
